<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Goal Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <h1>Daily<span>.</span></h1>
      <p>Track your goals — one rep at a time</p>
    </div>

    <div class="hamburger-btn js-hamburger-btn">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </header>

  <div class="add-form">
    <input type="text" id="titel" placeholder="New goal...">
    <input type="number" id="goal" placeholder="0">
    <button class="js-add-btn">+</button>
  </div>

  <p class="section-label">Your goals</p>
  <ul></ul>

  <div class="menu-overlay js-menu-overlay">
  <nav class="menu-nav">
    <a id="history" class="menu-link">History</a>
    <a href="#" class="menu-link">Statistiken</a>
    <a href="#" class="menu-link">Einstellungen</a>
  </nav>
</div>
  <script type="module" src="app.js"></script>
</body>
</html>
